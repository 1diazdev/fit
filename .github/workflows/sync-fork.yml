name: Sync Fork
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch upstream and merge
        run: |
          git remote add upstream https://github.com/JuanPabloDiaz/fit.git || git remote set-url upstream https://github.com/JuanPabloDiaz/fit.git
          git fetch upstream
          git pull --rebase origin main
          git merge upstream/main --no-edit --allow-unrelated-histories
          git push origin main
